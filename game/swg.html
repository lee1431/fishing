<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Stance Arcade — 미니멀 메인</title>
  <meta name="description" content="Stance Arcade: 간단한 미니게임 모음" />
  <style>
    :root{
      --bg:#0b0f14; --panel:#101621; --ink:#eaf2ff; --muted:#9fb0c7; --line:#1e2633; --accent:#61d6c2; --thumb:#0c121d; --pill:#0f172a;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;background:linear-gradient(180deg,#0a0f16,#070b11);color:var(--ink);font:14px/1.6 system-ui,-apple-system,Segoe UI,Roboto,Noto Sans KR,sans-serif}
    a{color:inherit;text-decoration:none}

    /* Layout */
    header{position:sticky;top:0;background:rgba(7,11,17,.85);backdrop-filter:saturate(150%) blur(6px);border-bottom:1px solid var(--line);}
    .wrap{max-width:1080px;margin:0 auto;padding:14px}
    .brand{display:flex;gap:12px;align-items:center}
    .brand h1{margin:0;font-size:16px;letter-spacing:.2px}
    .badge{font-size:10px;padding:2px 6px;border:1px solid var(--line);border-radius:999px;background:#0f1624;color:var(--muted)}

    /* Notice */
    .notice{margin:14px auto 0;background:var(--panel);border:1px solid var(--line);border-radius:14px}
    .notice h2{margin:0;padding:12px 14px;border-bottom:1px solid var(--line);font-size:14px}
    .notice ul{list-style:none;margin:0;padding:8px 12px 12px}
    .notice li{display:flex;gap:10px;align-items:baseline;padding:8px 6px;border-bottom:1px dashed #17202e}
    .notice li:last-child{border-bottom:0}
    .notice time{color:var(--muted);font-size:12px}

    /* Games */
    .section-title{margin:16px 0 10px;font-size:15px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}

    .card{display:grid;grid-template-rows:auto 1fr auto;gap:10px;padding:12px;border:1px solid var(--line);border-radius:14px;background:var(--panel)}
    .thumb{display:grid;place-items:center;height:120px;border-radius:10px;background:var(--thumb);color:var(--muted);font-weight:700}
    .card h3{margin:0;font-size:15px}
    .desc{color:var(--muted);font-size:13px;margin:0}
    .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
    .pill{padding:.28rem .55rem;border:1px solid var(--line);border-radius:999px;background:var(--pill);font-size:12px;color:var(--muted)}
    .play{justify-self:end;appearance:none;border:1px solid var(--line);background:#0f172a;color:var(--ink);padding:8px 12px;border-radius:10px;font-weight:700;cursor:pointer}
    .play:active{transform:translateY(1px)}

    /* Footer */
    footer{margin:18px 0 36px;color:var(--muted);font-size:12px;text-align:center}
    .hr{height:1px;background:var(--line);margin:18px 0}


    /* --- Play Count Badge --- */
    .card.game-card{ position:relative; }
    .play-badge{
      position:absolute; left:12px; top:12px;
      display:inline-flex; align-items:center; gap:6px;
      padding:4px 10px; border-radius:999px;
      background:#101826; border:1px solid #1f2937; color:#cbd5e1;
      font-size:12px; line-height:1; user-select:none;
      box-shadow:0 1px 0 rgba(0,0,0,.25), inset 0 0 0 1px rgba(255,255,255,.03);
    }
    .play-badge .dot{ width:6px; height:6px; border-radius:50%; background:#22c55e; opacity:.9; }
    .play-badge .num{ font-weight:700; }
    .play-badge .unit{ opacity:.8; }

    
  </style>

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9382191250873184"
     crossorigin="anonymous"></script>
  
</head>
<body>
  <header>
    <div class="wrap" style="display:flex;align-items:center;justify-content:space-between;gap:10px">
      <div class="brand">
        <div style="width:26px;height:26px;border:1px solid var(--line);border-radius:7px;display:grid;place-items:center;background:#0e1522;font-weight:800">S</div>
        <h1>Stance Arcade <span class="badge">minimal</span></h1>
      </div>
      <!-- 오른쪽은 비워둠(검색 등 확장용) -->
    </div>
  </header>

  <main class="wrap">
    <!-- 공지사항 -->
    <section class="notice" aria-labelledby="notice-title">
      <h2 id="notice-title">공지사항</h2>
      <ul id="noticeList">
        <!-- JS가 채움 -->
      </ul>
    </section>

    <!-- 게임 목록 -->
    <h2 class="section-title">게임 목록</h2>
    <section class="grid" id="gameGrid" aria-label="게임 카드 목록">
      <!-- JS가 채움 -->
    </section>

    <div class="hr"></div>
    <footer>
      <div>© 2025 Stance Arcade. All rights reserved.</div>
      <div style="margin-top:6px">Q : llsshh1431@naver.com</div>
    </footer>
  </main>

  <canvas id="starbg" style="position:fixed;inset:0;z-index:-1;pointer-events:none;"></canvas>

<script>
  // 🔔 공지사항 데이터 — 항목 추가/수정은 여기서 간단히!
  const NOTICES = [
    { date: '2025-11-06', text: '베타 오픈. 모바일 컨트롤(가상 D-Pad) 지원.' },
    { date: '2025-11-06', text: '새 게임 Dot Dodge(네모 피하기) 추가.' },
    { date: '2025-11-06', text: '새 게임 차선 바꾸기(칼치기) 추가.' },
  ];

  // 🎮 게임 목록 — 제목/경로/설명/태그만 채우면 카드가 자동 생성됩니다.
  const GAMES = [
    {
      key: 'BARBAR',
      title: '바바리안 — 맨주먹 전장',
      path: './baroker.html',
      desc: '스페이스: 공격 · Q: 광역 스킬(쿨 6초). 모바일 터치 버튼 지원.',
      tags: ['action','2D','arcade'],
      thumb: './img/baba.png'
    },
    {
      key: 'DODGE',
      title: 'Dot Dodge — 네모 피하기',
      path: './dge.html',
      desc: '방향키/터치로 이동, 떨어지는 박스를 피해 생존 점수에 도전!',
      tags: ['피하기','네모'],
      thumb: './img/nemo.png'
    },
    {
      key: 'ICEFISHING',
      title: '얼음낚시',
      path: './icefishing.html',
      desc: '얼음이 갈라지는 맛을 느껴 보세요!!',
      tags: ['구사일생,극한생존'],
      thumb: './img/if.png'
    },
    {
      key: 'PUTTING',
      title: 'Putting 챌린지',
      path: './putting.html',
      desc: '람각을 이용하여 퍼팅 챌린지에 참여하세요!',
      tags: ['람각크'],
      thumb: './img/putting.png'
    },
    {
      key: 'CAR',
      title: '차선 바꾸기',
      path: './car.html',
      desc: '차선변경을 하며 점수를 획득!! 운전면허증은 필수!',
      tags: ['칼치기'],
      thumb: './img/kal.png'
    }
  ];

  

  // 렌더링 -------------------------------------------------
  function el(html){ const t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstElementChild; }

  function renderNotices(){
    const ul = document.getElementById('noticeList');
    if(!NOTICES.length){ ul.innerHTML = '<li><em style="color:var(--muted)">현재 공지 없음</em></li>'; return; }
    ul.innerHTML = '';
    NOTICES.forEach(n => {
      ul.appendChild(el(`<li><time>${n.date}</time><span>${n.text}</span></li>`));
    });
  }

  function renderGames(){
    const grid = document.getElementById('gameGrid');
    grid.innerHTML = '';
    GAMES.forEach(g => {
      const pills = (g.tags||[]).map(t=>`<span class="pill">${t}</span>`).join('');
      const thumb = g.thumb
        ? `<img src="${g.thumb}" alt="${g.title} 썸네일" style="width:100%;height:120px;object-fit:cover;border-radius:10px"/>`
        : 'No Thumbnail';
  
      grid.appendChild(el(`
        <article class="card game-card" data-game="${g.key}">
          <!-- 조회수 배지 자리: JS가 채움 -->
          <div class="thumb">${thumb}</div>
          <div>
            <h3>${g.title}</h3>
            <p class="desc">${g.desc||''}</p>
            <div class="tags">${pills}</div>
          </div>
          <a class="play" href="${g.path}" aria-label="${g.title} 플레이" target="_blank" rel="noopener noreferrer">플레이</a>
        </article>
      `));
    });
  }

const COUNT_URL = "https://mrdindoin.ddns.net/data/favCnt.json";

async function renderPlayCounts(){
  try{
    const res = await fetch(COUNT_URL + "?t=" + Date.now(), { cache: "no-store" });
    const data = await res.json();

    document.querySelectorAll(".game-card").forEach(card => {
      const key = card.dataset.game;
      const n   = (data && data[key] != null) ? data[key] : 0;

      let badge = card.querySelector(".play-badge");
      if(!badge){
        badge = document.createElement("div");
        badge.className = "play-badge";
        badge.innerHTML = `<span class="dot"></span><span class="num"></span><span class="unit">회</span>`;
        card.prepend(badge);
      }
      badge.querySelector(".num").textContent = n.toLocaleString();
    });
  } catch(e){
    console.error("play count fetch failed:", e);
  }
}

renderNotices();
renderGames();
renderPlayCounts();
setInterval(renderPlayCounts, 60000);
  fetch("https://mrdindoin.ddns.net/logcnt/log?project=swg")
  .catch(()=>{});
</script>
  <script src="./js/luna2.js"></script>
</body>
</html>
