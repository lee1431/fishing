<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#8b5cf6" />
  <title>STANCE — FishingLog HUD Map</title>

  <meta property="og:title" content="STANCE - FishingLogs" />
  <meta property="og:description" content="인생과 시간의 기록. FishingLog by Stance." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://llsshh.com/project/stsf" />
  <meta property="og:image" content="https://llsshh.com/project/stsf/stsf.png" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    :root{
      --bg:#070b14;
      --bg-soft:#0c1324;
      --panel:rgba(10,16,30,.72);
      --panel-2:rgba(13,20,36,.86);
      --panel-3:rgba(17,25,44,.92);
      --line:rgba(255,255,255,.08);
      --line-strong:rgba(255,255,255,.14);
      --text:#edf3ff;
      --muted:#97a6c4;
      --accent:#8b5cf6;
      --accent-2:#22d3ee;
      --accent-3:#34d399;
      --shadow:0 20px 60px rgba(0,0,0,.45);
      --radius:24px;
      --radius-md:18px;
      --radius-sm:14px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --sans: Inter, system-ui, -apple-system, Segoe UI, Roboto, Apple SD Gothic Neo, "Noto Sans KR", sans-serif;
      --topbar-h:64px;
      --pad:16px;
      --mob-pad:10px;
      --mob-gap:10px;
      --mob-map-h:42vh;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      color:var(--text);
      font-family:var(--sans);
      background:
        radial-gradient(900px 520px at 0% 0%, rgba(139,92,246,.22), transparent 55%),
        radial-gradient(1000px 700px at 100% 100%, rgba(34,211,238,.16), transparent 58%),
        linear-gradient(180deg, #05070d 0%, #090f1b 55%, #060a12 100%);
      overflow:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(circle at center, black 40%, transparent 85%);
      opacity:.22;
    }

    .hud{
      position:relative;
      height:100%;
      display:grid;
      grid-template-columns: minmax(0, 1.75fr) minmax(360px, .95fr);
      gap:16px;
      padding: calc(var(--topbar-h) + 20px) 16px 16px;
    }

    .panel{
      position:relative;
      min-height:0;
      overflow:hidden;
      border-radius:var(--radius);
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(13,20,36,.82), rgba(10,14,24,.92));
      box-shadow:var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .panel::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:linear-gradient(180deg, rgba(255,255,255,.04), transparent 24%, transparent 80%, rgba(255,255,255,.02));
    }

    .panel::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      border-radius:inherit;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06), inset 0 0 0 1px rgba(255,255,255,.02);
    }

    .topbar{
      position:fixed;
      left:16px;
      right:16px;
      top:16px;
      z-index:50;
      height:var(--topbar-h);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:12px 14px;
      border-radius:22px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(7,11,20,.72);
      box-shadow:0 10px 30px rgba(0,0,0,.28);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:800;
      letter-spacing:-.02em;
    }

    .brand .badge{
      width:12px;
      height:12px;
      border-radius:999px;
      background:linear-gradient(135deg, var(--accent-3), var(--accent-2));
      box-shadow:0 0 0 4px rgba(52,211,153,.1), 0 0 26px rgba(34,211,238,.35);
    }

    .brand strong{
      font-size:16px;
    }

    .brand small{
      color:var(--muted);
      font-weight:600;
      margin-left:4px;
    }

    .status{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .pill,
    .btn,
    .chip,
    .tag,
    .overlayTitle,
    .overlayClose,
    .pinInput{
      font-family:var(--mono);
    }

    .pill{
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
      color:var(--muted);
      padding:10px 12px;
      border-radius:999px;
      font-size:12px;
      line-height:1;
      white-space:nowrap;
    }

    .btn{
      cursor:pointer;
      user-select:none;
      border:1px solid rgba(255,255,255,.08);
      color:var(--text);
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      padding:10px 13px;
      border-radius:999px;
      font-size:12px;
      line-height:1;
      transition:transform .15s ease, border-color .15s ease, background .15s ease, box-shadow .15s ease;
      white-space:nowrap;
    }

    .btn:hover,
    .chip:hover,
    .overlayClose:hover{
      transform:translateY(-1px);
      border-color:rgba(139,92,246,.45);
      background:linear-gradient(180deg, rgba(139,92,246,.18), rgba(34,211,238,.08));
      box-shadow:0 10px 22px rgba(0,0,0,.22);
    }

    .btn:active,
    .chip:active,
    .overlayClose:active{
      transform:translateY(0);
    }

    .mapWrap{ position:relative; }
    .map{ position:absolute; inset:0; }

    .mapWrap::before{
      content:"";
      position:absolute;
      inset:12px;
      z-index:500;
      pointer-events:none;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.05);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.02);
    }

    .crosshair{
      position:absolute;
      left:50%;
      top:50%;
      width:34px;
      height:34px;
      transform:translate(-50%,-50%);
      z-index:1000;
      pointer-events:none;
      filter: drop-shadow(0 0 18px rgba(139,92,246,.36));
      opacity:.92;
    }

    .crosshair::before,
    .crosshair::after{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      background:rgba(139,92,246,.94);
      border-radius:999px;
    }

    .crosshair::before{ width:34px; height:2px; }
    .crosshair::after{ width:2px; height:34px; }

    .crosshair .dot{
      position:absolute;
      left:50%;
      top:50%;
      width:10px;
      height:10px;
      transform:translate(-50%,-50%);
      border-radius:999px;
      background:linear-gradient(135deg, var(--accent-3), var(--accent-2));
      box-shadow:0 0 22px rgba(34,211,238,.4);
    }

    .side{
      display:flex;
      flex-direction:column;
      min-height:0;
      background:
        linear-gradient(180deg, rgba(11,17,31,.92), rgba(9,13,23,.96));
    }

    .sideHead{
      padding:18px 18px 10px;
      display:grid;
      grid-template-columns:1fr auto auto;
      gap:10px;
      align-items:start;
      position:relative;
      z-index:2;
      border-bottom:1px solid rgba(255,255,255,.06);
      background:linear-gradient(180deg, rgba(255,255,255,.02), transparent);
    }

    .title{
      margin:0;
      display:flex;
      align-items:center;
      gap:10px;
      font-size:22px;
      line-height:1.1;
      font-weight:900;
      letter-spacing:-.03em;
    }

    .title i{
      width:10px;
      height:10px;
      border-radius:999px;
      background:linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow:0 0 18px rgba(139,92,246,.48);
      flex:0 0 auto;
    }

    .subtitle{
      margin-top:8px;
      color:var(--muted);
      font-size:12px;
      line-height:1.45;
    }

    .filters{
      padding:12px 18px 8px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      position:relative;
      z-index:2;
    }

    .chip{
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
      color:var(--text);
      padding:8px 12px;
      border-radius:999px;
      font-size:12px;
      cursor:pointer;
      transition:all .15s ease;
    }

    .chip.on{
      border-color:rgba(34,211,238,.38);
      background:linear-gradient(180deg, rgba(34,211,238,.16), rgba(139,92,246,.12));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
    }

    .list{
      padding:8px 12px 12px;
      overflow:auto;
      min-height:0;
      position:relative;
      z-index:2;
    }

    .list::-webkit-scrollbar{ width:10px; }
    .list::-webkit-scrollbar-thumb{
      background:rgba(255,255,255,.12);
      border-radius:999px;
      border:2px solid transparent;
      background-clip:padding-box;
    }
    .list::-webkit-scrollbar-track{ background:transparent; }

    .card{
      position:relative;
      border:1px solid rgba(255,255,255,.07);
      border-radius:20px;
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.025));
      margin:10px 4px;
      overflow:hidden;
      cursor:pointer;
      transition:transform .16s ease, border-color .16s ease, background .16s ease, box-shadow .16s ease;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:linear-gradient(90deg, rgba(139,92,246,.12), transparent 35%, transparent 65%, rgba(34,211,238,.10));
      opacity:.35;
    }

    .card:hover{
      transform:translateY(-2px);
      border-color:rgba(139,92,246,.3);
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      box-shadow:0 18px 26px rgba(0,0,0,.24);
    }

    .card.on{
      border-color:rgba(34,211,238,.35);
      background:linear-gradient(180deg, rgba(34,211,238,.1), rgba(139,92,246,.08));
      box-shadow:0 0 0 1px rgba(34,211,238,.08), 0 18px 34px rgba(0,0,0,.3);
    }

    .cardBody{
      position:relative;
      z-index:1;
      display:flex;
      gap:12px;
      padding:12px;
      align-items:flex-start;
    }

    .thumb{
      width:92px;
      height:92px;
      border-radius:16px;
      overflow:hidden;
      flex:0 0 auto;
      border:1px solid rgba(255,255,255,.08);
      background:linear-gradient(135deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--muted);
      font-size:11px;
      letter-spacing:.08em;
    }

    .thumb img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .meta{
      flex:1;
      min-width:0;
    }

    .line1{
      display:flex;
      justify-content:space-between;
      gap:10px;
      font-size:11px;
      color:var(--muted);
      margin-bottom:8px;
    }

    .line2{
      font-size:15px;
      line-height:1.35;
      font-weight:800;
      letter-spacing:-.02em;
      margin-bottom:10px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .tags{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
    }

    .tag{
      font-size:11px;
      padding:6px 9px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.05);
      color:rgba(237,243,255,.94);
    }

    .tag.place{ background:rgba(52,211,153,.08); }
    .tag.fish{ background:rgba(34,211,238,.09); }
    .tag.note{ background:rgba(139,92,246,.09); }

    .overlay{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      padding:16px;
      background:rgba(3,5,10,.64);
      backdrop-filter: blur(8px);
      z-index:999;
    }

    .overlay.on{ display:flex; }

    .overlayCard{
      width:min(1100px, 96vw);
      height:min(720px, 90vh);
      border-radius:26px;
      border:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg, rgba(11,16,29,.88), rgba(8,12,22,.96));
      box-shadow:0 30px 90px rgba(0,0,0,.52);
      position:relative;
      overflow:hidden;
    }

    .overlayTop{
      position:absolute;
      top:12px;
      left:12px;
      right:12px;
      z-index:5;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }

    .overlayTitle,
    .overlayClose{
      padding:10px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.05);
      color:var(--text);
      font-size:12px;
    }

    .overlayClose{ cursor:pointer; }
    .overlayMap{ position:absolute; inset:0; }

    .pinInput{
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
      color:var(--text);
      border-radius:14px;
      padding:12px 14px;
      outline:none;
      width:100%;
      transition:border-color .15s ease, background .15s ease, box-shadow .15s ease;
    }

    .pinInput::placeholder{ color:#8492af; }
    .pinInput:focus{
      border-color:rgba(34,211,238,.35);
      background:rgba(255,255,255,.06);
      box-shadow:0 0 0 4px rgba(34,211,238,.08);
    }

    .leaflet-control-container .leaflet-control{
      border-radius:14px !important;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08) !important;
      box-shadow:0 8px 18px rgba(0,0,0,.24) !important;
    }

    .leaflet-bar a{
      background:rgba(14,20,34,.9) !important;
      color:var(--text) !important;
      border-bottom:1px solid rgba(255,255,255,.08) !important;
    }

    .leaflet-bar a:hover{ background:rgba(139,92,246,.18) !important; }

    .leaflet-tooltip{
      background:rgba(7,11,20,.92);
      color:var(--text);
      border:1px solid rgba(255,255,255,.08);
      border-radius:12px;
      box-shadow:0 12px 24px rgba(0,0,0,.28);
    }

    @media (max-width: 980px){
      html,body{ height:100%; overflow:hidden; }
      .hud{
        height:100vh;
        overflow:hidden;
        padding: calc(var(--topbar-h) + 14px) var(--mob-pad) var(--mob-pad);
        grid-template-columns:1fr;
        grid-template-rows: var(--mob-map-h) 1fr;
        gap:var(--mob-gap);
      }
      .side{ overflow:hidden; }
      .list{
        overflow:auto;
        -webkit-overflow-scrolling:touch;
      }
      .subtitle{ display:none; }
      .filters{ padding-top:10px; }
      .sideHead{
        grid-template-columns:1fr auto;
      }
      #btnPinHere{ grid-column:2; }
    }

    @media (max-width: 680px){
      .topbar{
        left:10px;
        right:10px;
        top:10px;
        height:54px;
        padding:8px 10px;
        border-radius:18px;
      }
      .brand strong{ font-size:14px; }
      .brand small{ display:none; }
      .status{ gap:8px; }
      .pill,
      .btn{ padding:8px 10px; font-size:11px; }
      .sideHead{
        padding:14px 14px 8px;
        gap:8px;
      }
      .title{ font-size:18px; }
      .filters{ padding:10px 14px 6px; }
      .list{ padding:6px 10px 10px; }
      .thumb{ width:78px; height:78px; }
      .line2{ font-size:14px; }
    }

    @media (max-width: 520px){
      #todayPill,
      #coordPill{ display:none !important; }
      .filters{ display:none; }
      .cardBody{ padding:10px; gap:10px; }
      .thumb{ width:74px; height:74px; border-radius:14px; }
      .sideHead{
        grid-template-columns:1fr auto auto;
      }
      .btn{ padding:8px 9px; }
    }
  </style>

</head>
<body>
  <div class="topbar">
    <div class="brand">
      <div class="badge"></div>
      <div>
        <strong>STANCE / FishingLog</strong>
        <small>Geo Journal HUD</small>
      </div>
    </div>
    <div class="status">
      <div class="pill" id="todayPill">DATE</div>
      <div class="pill" id="coordPill">LAT,LNG</div>
      <div class="btn" id="btnPicture">PICTURE</div>
      <div class="btn" id="btnLocate">LOCATE</div>
    </div>
  </div>

  <div class="hud">
    <section class="panel mapWrap">
      <div id="mapMain" class="map"></div>
      <div class="crosshair"><div class="dot"></div></div>
    </section>

    <aside class="panel side">
      <div class="sideHead">
        <div>
          <h2 class="title"><i></i>낚시 로그</h2>
          <div class="subtitle">위치와 시간의 흐름을 한 화면에서 기록하는 STANCE FishingLog HUD</div>
        </div>
        <div class="btn" id="btnFocusAll">FOCUS ALL</div>
        <div class="btn" id="btnPinHere">PIN HERE</div>
      </div>

      <div class="filters" id="filters">
        <div class="chip on" data-filter="all">ALL</div>
        <div class="chip" data-filter="붕어">낚시</div>
        <div class="chip" data-filter="채집">채집</div>
        <div class="chip" data-filter="채집">여행</div>
      </div>

      <div class="list" id="logList"></div>
    </aside>
  </div>

  <div class="overlay" id="overlay">
    <div class="overlayCard">
      <div class="overlayTop">
        <div class="overlayTitle">FULL MAP / OVERVIEW</div>
        <div class="overlayClose" id="overlayClose">CLOSE (ESC)</div>
      </div>
      <div id="mapOverlay" class="overlayMap"></div>
    </div>
  </div>

  <div class="overlay" id="pinModal">
    <div class="overlayCard" style="height:auto; width:min(520px, 96vw);">
      <div class="overlayTop">
        <div class="overlayTitle">NEW LOG (PIN HERE)</div>
        <div class="overlayClose" id="pinClose">CLOSE (ESC)</div>
      </div>
      <div style="padding:58px 14px 14px;">
        <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:10px;">
          <div class="pill" id="pinLatLng">LAT,LNG</div>
          <input id="pinPlace" placeholder="장소 (예: 탄금호)" style="flex:1; min-width:180px;" class="pinInput">
        </div>
        <input id="pinTitle" placeholder="한줄 메모 (예: 새벽 물안개, 입질 2번)" class="pinInput" style="margin-bottom:10px;">
        <input id="pinTags" placeholder="태그 (쉼표로) 예: 붕어,초겨울,바람" class="pinInput" style="margin-bottom:10px;">
        <div style="display:flex; gap:10px; align-items:center; margin-bottom:12px;">
          <input id="pinPhoto" type="file" accept="image/*" class="pinInput" style="flex:1;">
        </div>
        <div style="display:flex; gap:10px; justify-content:flex-end;">
          <div class="btn" id="pinSave">SAVE</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    let LOGS = [];

    async function loadFromServer(){
      try{
        const res = await fetch("https://mrdindoin.ddns.net/stsf/api/logs", { cache: "no-store" });
        if(!res.ok) throw new Error("HTTP " + res.status);
        LOGS = await res.json();
        render();
        fitAll(LOGS);
      }catch(err){
        console.error("LOG LOAD FAIL:", err);
        alert("로그를 불러오지 못했습니다");
      }
    }

    const $ = (sel)=>document.querySelector(sel);
    const $$ = (sel)=>Array.from(document.querySelectorAll(sel));

    function fmtToday(){
      const d = new Date();
      const pad = (n)=>String(n).padStart(2,"0");
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }
    $("#todayPill").textContent = fmtToday();

    const start = { lat: 36.99, lng: 127.92, zoom: 12 };
    const mapMain = L.map("mapMain", { zoomControl:true }).setView([start.lat, start.lng], start.zoom);
    const mapOverlay = L.map("mapOverlay", { zoomControl:true }).setView([start.lat, start.lng], 11);

    const tile = "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png";
    const attr = "&copy; OpenStreetMap contributors";
    L.tileLayer(tile, { attribution: attr, maxZoom: 19 }).addTo(mapMain);
    L.tileLayer(tile, { attribution: attr, maxZoom: 19 }).addTo(mapOverlay);

    const markersMain = new Map();
    const markersOverlay = new Map();

    function makeIcon(kind){
      const glow = kind === "붕어" ? "#34d399" : kind === "블루길" ? "#22d3ee" : kind === "빙어" ? "#fbbf24" : "#8b5cf6";
      return L.divIcon({
        className: "",
        html: `
          <div style="
            width:16px;height:16px;border-radius:999px;
            background: radial-gradient(circle at 30% 30%, #ffffff, #d8c5ff 30%, #8b5cf6 68%);
            box-shadow: 0 0 0 4px rgba(6,10,18,.38), 0 0 22px ${glow}66;
            border:1px solid rgba(255,255,255,.25);
          "></div>
        `,
        iconSize: [16,16],
        iconAnchor: [8,8]
      });
    }

    function toNum(v){
      const n = Number(v);
      return Number.isFinite(n) ? n : null;
    }

    function addLogMarker(log){
      const lat = toNum(log.lat);
      const lng = toNum(log.lng);
      if(lat === null || lng === null){
        console.warn("SKIP marker (bad lat/lng):", log);
        return;
      }

      const primary = (log.fish && log.fish[0]) ? log.fish[0] : "기록";
      const icon = makeIcon(primary);
      const m1 = L.marker([lat, lng], { icon }).addTo(mapMain);
      const m3 = L.marker([lat, lng], { icon }).addTo(mapOverlay);
      const tip = `<b>${log.title}</b><br>${log.place || "장소 미지정"}<br><span style="opacity:.72">${log.date}</span>`;

      m1.bindTooltip(tip, { direction:"top", opacity:0.96 });
      m3.bindTooltip(tip, { direction:"top", opacity:0.96 });

      const onClick = ()=> selectLog(log.id, true);
      m1.on("click", onClick);
      m3.on("click", onClick);

      markersMain.set(log.id, m1);
      markersOverlay.set(log.id, m3);
    }

    function clearMarkers(){
      for (const m of markersMain.values()) mapMain.removeLayer(m);
      for (const m of markersOverlay.values()) mapOverlay.removeLayer(m);
      markersMain.clear();
      markersOverlay.clear();
    }

    function isValidLatLng(lat, lng){
      lat = Number(lat);
      lng = Number(lng);
      return Number.isFinite(lat) && Number.isFinite(lng) && Math.abs(lat) <= 90 && Math.abs(lng) <= 180;
    }

    function fitAll(logs){
      const pts = (logs || []).map(x => [Number(x.lat), Number(x.lng)]).filter(([lat,lng]) => isValidLatLng(lat,lng));
      if(!pts.length) return;
      const bounds = L.latLngBounds(pts);
      mapMain.fitBounds(bounds, { padding:[40,40] });
      mapOverlay.fitBounds(bounds, { padding:[40,40] });
    }

    let activeFilter = "all";
    let selectedId = null;

    function matchesFilter(log){
      if(activeFilter === "all") return true;
      if(log.fish?.includes(activeFilter)) return true;
      if(log.tags?.includes(activeFilter)) return true;
      if(log.place?.includes(activeFilter)) return true;
      if(log.title?.includes(activeFilter)) return true;
      return false;
    }

    function escapeHtml(str){
      return String(str ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#39;");
    }

    function render(){
      const filtered = LOGS.filter(matchesFilter);
      clearMarkers();
      filtered.forEach(addLogMarker);

      const list = $("#logList");
      list.innerHTML = "";

      filtered.slice().sort((a,b)=> (a.date < b.date ? 1 : -1)).forEach(log=>{
        const card = document.createElement("div");
        card.className = "card" + (log.id === selectedId ? " on" : "");
        card.dataset.id = log.id;

        const tags = []
          .concat([{t: log.place || "장소 미지정", cls:"place"}])
          .concat((log.fish || []).map(f=>({t:f, cls:"fish"})))
          .concat((log.tags || []).slice(0,4).map(t=>({t, cls:"note"})));

        card.innerHTML = `
          <div class="cardBody">
            <div class="thumb">${log.photo ? `<img src="${log.photo}" alt="">` : `NO PHOTO`}</div>
            <div class="meta">
              <div class="line1">
                <span>${log.date || "-"}</span>
                <span style="opacity:.75">${log.id}</span>
              </div>
              <div class="line2">${escapeHtml(log.title)}</div>
              <div class="tags">
                ${tags.map(x=>`<span class="tag ${x.cls}">#${escapeHtml(x.t)}</span>`).join("")}
              </div>
            </div>
          </div>
        `;

        card.addEventListener("click", ()=> selectLog(log.id, true));
        list.appendChild(card);
      });

      if(selectedId && !filtered.some(x=>x.id===selectedId)) selectedId = null;
    }

    function clearSelection(){
      selectedId = null;
      $$(".card").forEach(c=> c.classList.remove("on"));
      for (const m of markersMain.values()) m.closeTooltip();
    }

    mapMain.on("click", clearSelection);

    window.addEventListener("keydown", (e)=>{
      if(e.key === "Escape") clearSelection();
    });

    function selectLog(id, pan){
      selectedId = id;
      $$(".card").forEach(c=> c.classList.toggle("on", c.dataset.id===id));
      const log = LOGS.find(x=>x.id===id);
      if(!log) return;

      const lat = Number(log.lat);
      const lng = Number(log.lng);
      if(pan && isValidLatLng(lat, lng)){
        mapMain.flyTo([lat, lng], Math.max(mapMain.getZoom(), 14), { duration: 0.6 });
        mapOverlay.flyTo([lat, lng], Math.max(mapOverlay.getZoom(), 13), { duration: 0.6 });
      }

      const m = markersMain.get(id);
      if(m) m.openTooltip();

      const card = document.querySelector(`.card[data-id="${CSS.escape(id)}"]`);
      if(card) card.scrollIntoView({ block:"nearest", behavior:"smooth" });
    }

    $$("#filters .chip").forEach(chip=>{
      chip.addEventListener("click", ()=>{
        $$("#filters .chip").forEach(c=>c.classList.remove("on"));
        chip.classList.add("on");
        activeFilter = chip.dataset.filter;
        render();
      });
    });

    function setCoordPill(latlng){
      $("#coordPill").textContent = `${latlng.lat.toFixed(6)}, ${latlng.lng.toFixed(6)}`;
    }

    mapMain.on("move", ()=> setCoordPill(mapMain.getCenter()));
    setCoordPill(mapMain.getCenter());

    const overlay = $("#overlay");
    const pinModal = $("#pinModal");
    let pinPoint = null;

    function openPinModal(lat, lng){
      pinPoint = { lat, lng };
      $("#pinLatLng").textContent = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
      $("#pinTitle").value = "";
      $("#pinTags").value = "";
      $("#pinPlace").value = "";
      $("#pinPhoto").value = "";
      pinModal.classList.add("on");
    }

    function closePinModal(){
      pinModal.classList.remove("on");
    }

    $("#btnPinHere").addEventListener("click", ()=>{
      const c = mapMain.getCenter();
      openPinModal(c.lat, c.lng);
    });

    $("#pinClose").addEventListener("click", closePinModal);
    pinModal.addEventListener("click", (e)=>{ if(e.target === pinModal) closePinModal(); });
    $("#overlayClose")?.addEventListener("click", ()=> overlay.classList.remove("on"));

    window.addEventListener("keydown", (e)=>{
      if(e.key === "Escape"){
        closePinModal();
        overlay.classList.remove("on");
      }
    });

    async function savePinToServer(){
      if(!pinPoint) return;
      const title = $("#pinTitle").value.trim();
      if(!title){ alert("한줄 메모는 필수!"); return; }

      const place = $("#pinPlace").value.trim();
      const tagsRaw = $("#pinTags").value.trim();
      const tags = tagsRaw ? tagsRaw.split(",").map(s=>s.trim()).filter(Boolean) : [];

      const fd = new FormData();
      fd.append("title", title);
      fd.append("place", place);
      fd.append("lat", String(pinPoint.lat));
      fd.append("lng", String(pinPoint.lng));
      fd.append("tags", JSON.stringify(tags));
      const file = $("#pinPhoto").files?.[0];
      if(file) fd.append("photo", file);

      const res = await fetch("https://mrdindoin.ddns.net/stsf/api/logs", { method:"POST", body: fd });
      if(!res.ok){
        const t = await res.text();
        throw new Error(t || "save failed");
      }
      return await res.json();
    }

    $("#pinSave").addEventListener("click", async ()=>{
      let saved = null;
      try{
        saved = await savePinToServer();
        saved.lat = Number(saved.lat);
        saved.lng = Number(saved.lng);
        if(!isValidLatLng(saved.lat, saved.lng)) throw new Error("server lat/lng invalid");
        LOGS.push(saved);
        render();
        try { selectLog(saved.id, true); } catch(e){ console.warn("selectLog error:", e); }
      }catch(err){
        console.log("저장 실패: " + (err?.message || err));
        return;
      }finally{
        if(saved) closePinModal();
      }
    });

    $("#btnPicture").addEventListener("click", ()=>{
      window.open("https://llsshh.com/stsfg.html", "_blank");
    });

    $("#btnFocusAll").addEventListener("click", ()=>{
      fitAll(LOGS.filter(matchesFilter));
    });

    $("#btnLocate").addEventListener("click", ()=>{
      if(!navigator.geolocation){
        alert("이 브라우저는 위치를 지원 안함");
        return;
      }
      navigator.geolocation.getCurrentPosition((pos)=>{
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        mapMain.flyTo([lat,lng], 15, {duration:0.8});
        mapOverlay.flyTo([lat,lng], 14, {duration:0.8});
        L.circleMarker([lat,lng], {
          radius: 8,
          color: "#22d3ee",
          weight: 2,
          fillColor: "#22d3ee",
          fillOpacity: 0.2
        }).addTo(mapMain).bindTooltip("YOU", {direction:"top", opacity:0.92}).openTooltip();
      }, (err)=>{
        alert("위치 권한이 필요함: " + err.message);
      }, { enableHighAccuracy:true, timeout:8000 });
    });

    loadFromServer();
    render();
    fitAll(LOGS);
  </script>
