
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>플래닛충주</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#111111">
  <link rel="manifest" href="/static/manifest.json">
</head>
<body>
  <h1>플래닛충주</h1>
  <p>안드로이드 크롬에서 홈 화면에 추가 후 테스트하세요.</p>

  <button id="enablePushBtn">긴급 알림 등록</button>
  <pre id="log"></pre>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
    import {
      getMessaging,
      getToken
    } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-messaging.js";

    const log = (msg) => {
      document.getElementById("log").textContent += msg + "\n";
    };

    const firebaseConfig = {
      apiKey: "AIzaSyADBKE55xsHk1jruNCeQCnSOquzRQyUb54",
      authDomain: "planet-chungju-oldman.firebaseapp.com",
      projectId: "planet-chungju-oldman",
      messagingSenderId: "1036324205380",
      appId: "1:1036324205380:web:04a84938f0a464b0a4dd11"
    };

    const vapidKey = "BEm3HlqWy_D8EKaOxrhWY46LExSp-hrv86s86cOvGcpHty-XmRmtX_DtSal6hBBAaTvU-VPgM4BuAUJrJKhkm70";

    const app = initializeApp(firebaseConfig);
    const messaging = getMessaging(app);

    async function registerServiceWorker() {
      if (!("serviceWorker" in navigator)) {
        throw new Error("서비스워커를 지원하지 않는 브라우저입니다.");
      }

      const registration = await navigator.serviceWorker.register("https://mrdindoin.ddns.net/planetcj/static/firebase-messaging-sw.js");
      log("서비스워커 등록 완료");
      return registration;
    }

    async function enablePush() {
      try {
        const registration = await registerServiceWorker();

        const permission = await Notification.requestPermission();
        log("권한 상태: " + permission);

        if (permission !== "granted") {
          alert("알림 권한이 허용되지 않았습니다.");
          return;
        }

        const token = await getToken(messaging, {
          vapidKey,
          serviceWorkerRegistration: registration
        });

        if (!token) {
          alert("FCM 토큰을 받지 못했습니다.");
          return;
        }

        log("토큰 발급 완료");
        log(token);

        const res = await fetch("https://mrdindoin.ddns.net/planetcj/api/save-token", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token })
        });

        const data = await res.json();
        log("서버 저장 결과: " + JSON.stringify(data));
        alert("긴급 알림 등록 완료");
      } catch (err) {
        console.error(err);
        log("에러: " + err.message);
        alert("오류: " + err.message);
      }
    }

    document.getElementById("enablePushBtn").addEventListener("click", enablePush);
  </script>
</body>
</html>
