<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>응모 현황</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto;max-width:920px;margin:40px auto;padding:0 16px;}
    .grid{display:grid;grid-template-columns:1fr;gap:14px;}
    @media(min-width:900px){.grid{grid-template-columns:1.2fr .8fr;}}
    .card{border:1px solid #ddd;border-radius:12px;padding:18px;}
    input,button,textarea{font:inherit;padding:10px;border-radius:10px;border:1px solid #ccc;width:100%;}
    button{cursor:pointer}
    ul{margin:10px 0 0 0;padding-left:18px}
    .muted{color:#666;font-size:14px}
    .pill{display:inline-block;padding:4px 10px;border:1px solid #ddd;border-radius:999px;font-size:13px;color:#444}
    .review{border-top:1px dashed #ddd;padding-top:10px;margin-top:10px}
    .row{display:flex;gap:10px}
  </style>
</head>
<body>
  <h1>응모 현황 <span id="count" class="pill">0명</span></h1>
  <div class="muted">이 화면은 현재까지 응모한 인원의 풀을 보여줍니다. (이메일은 일부 마스킹됩니다)</div>

  <div style="height:14px"></div>

  <div class="grid">
    <div class="card">
      <h2 style="margin-top:0">응모자 풀</h2>
      <div class="muted" id="poolMsg">불러오는 중...</div>
      <ul id="list"></ul>
    </div>

    <div class="card">
      <h2 style="margin-top:0">후기 남기기(자유)</h2>
      <div class="muted">상품 수령 여부와 관계없이 남길 수 있어요.</div>
      <div style="height:10px"></div>
      <input id="name" placeholder="이름(선택) - 예: 상현" maxlength="40" />
      <div style="height:10px"></div>
      <textarea id="content" placeholder="후기 내용" rows="5" maxlength="2000"></textarea>
      <div style="height:10px"></div>
      <button id="post">후기 등록</button>
      <div class="muted" id="postMsg" style="margin-top:10px"></div>

      <div class="review">
        <h3 style="margin:0">후기 목록</h3>
        <div id="reviews" class="muted" style="margin-top:10px">불러오는 중...</div>
      </div>
    </div>
  </div>

  <script>
    const $ = (s)=>document.querySelector(s);

    async function loadPool(){
      const res = await fetch("https://mrdindoin.ddns.net/entry/api/pool");
      const data = await res.json();
      $("#count").textContent = `${data.count}명`;
      $("#poolMsg").textContent = data.count ? "최근 응모 순" : "아직 응모자가 없어요.";
      const ul = $("#list");
      ul.innerHTML = "";
      data.entries.forEach(e=>{
        const li = document.createElement("li");
        li.textContent = `${e.email_masked} · ${e.created_at}`;
        ul.appendChild(li);
      });
    }

    function escapeHtml(s){
      return s.replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");
    }

    async function loadReviews(){
      const res = await fetch("https://mrdindoin.ddns.net/entry/api/reviews");
      const data = await res.json();
      const wrap = $("#reviews");
      if(!data.reviews.length){
        wrap.innerHTML = `<div class="muted">아직 후기가 없어요.</div>`;
        return;
      }
      wrap.innerHTML = data.reviews.map(r => `
        <div style="padding:10px 0;border-bottom:1px solid #eee">
          <div><b>${escapeHtml(r.display_name || "익명")}</b> <span class="muted">· ${r.created_at}</span></div>
          <div style="white-space:pre-wrap;margin-top:6px">${escapeHtml(r.content)}</div>
        </div>
      `).join("");
    }

    $("#post").addEventListener("click", async ()=>{
      const display_name = $("#name").value.trim();
      const content = $("#content").value.trim();

      $("#post").disabled = true;
      $("#postMsg").textContent = "등록 중...";

      try{
        const res = await fetch("https://mrdindoin.ddns.net/entry/api/reviews", {
          method:"POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({ display_name, content })
        });
        const data = await res.json().catch(()=>({}));
        if(!res.ok) throw new Error(data.error || "failed");

        $("#name").value = "";
        $("#content").value = "";
        $("#postMsg").textContent = "등록 완료!";
        await loadReviews();
      }catch(e){
        $("#postMsg").textContent = "등록 실패. 내용(최소 3자) 확인해주세요.";
      }finally{
        $("#post").disabled = false;
        setTimeout(()=> $("#postMsg").textContent = "", 2000);
      }
    });

    loadPool();
    loadReviews();
    // 풀은 가볍게 자동 갱신
    setInterval(loadPool, 10000);
  </script>
</body>
</html>
