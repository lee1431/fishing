<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>방치형 아이템 획득 - Motion (Log + Inventory)</title>
  <style>
    :root{
      --bg:#070a10; --fg:#e8eefc;
      --card:rgba(255,255,255,.04);
      --line:rgba(255,255,255,.10);
      --line2:rgba(255,255,255,.08);
      --btn:rgba(49,210,255,.12);
      --btnLine:rgba(49,210,255,.30);
    }
    html,body{height:100%;margin:0;background:var(--bg);color:var(--fg);font-family:ui-monospace,Menlo,Consolas,monospace;}
    .wrap{max-width:980px;margin:0 auto;padding:18px;}
    .row{display:flex;gap:12px;flex-wrap:wrap;align-items:stretch;}
    .card{
      background:var(--card);
      border:1px solid var(--line2);
      border-radius:16px;
      padding:14px;
      flex:1;
      min-width:280px;
      position:relative;
      overflow:hidden;
      box-shadow: 0 10px 50px rgba(0,0,0,.35);
    }
    .big{font-size:22px;font-weight:700;letter-spacing:.2px;}
    .muted{opacity:.75;font-size:12px;}
    .btn{
      background:var(--btn);
      color:var(--fg);
      border:1px solid var(--btnLine);
      border-radius:12px;
      padding:9px 12px;
      cursor:pointer;
      user-select:none;
      transition:.12s transform ease;
    }
    .btn:active{transform:scale(.98);}
    .btn:disabled{opacity:.45;cursor:not-allowed;}
    .btn2{
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
    }
    .statline{display:flex;align-items:baseline;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-top:8px}
    .pill{padding:2px 8px;border:1px solid rgba(255,255,255,.12);border-radius:999px;background:rgba(0,0,0,.18);font-size:12px;opacity:.9}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}

    /* log */
    .logbox{
      margin-top:10px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.18);
      border-radius:12px;
      padding:10px;
      height:320px;
      overflow:auto;
      white-space:pre-wrap;
      line-height:1.35;
      font-size:13px;
    }
    .logbox b{font-weight:800}
    .log-green{color:#88ffb3}
    .log-cyan{color:#7fe7ff}
    .log-gray{color:rgba(232,238,252,.85)}
    .log-warn{color:#ffd27f}

    /* inventory */
    .inv-card{margin-top:12px;}
    .inv-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
    .inv-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
    .inv-controls input,.inv-controls select{
      background:rgba(255,255,255,.04);
      color:var(--fg);
      border:1px solid rgba(255,255,255,.12);
      border-radius:10px;
      padding:8px 10px;
      outline:none;
      min-width:180px;
    }
    .inv-controls select{min-width:140px}
    .inv-grid{
      margin-top:12px;
      display:grid;
      grid-template-columns:repeat(7,minmax(0,1fr));
      gap:10px;
    }
    @media (max-width: 980px){
      .inv-grid{grid-template-columns:repeat(4,minmax(0,1fr));}
    }
    @media (max-width: 560px){
      .inv-grid{grid-template-columns:repeat(2,minmax(0,1fr));}
    }

    .inv-slot{
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.10);
      border-radius:14px;
      padding:10px;
      min-height:76px;
      position:relative;
      overflow:hidden;
      cursor:pointer;
    }
    .inv-slot:hover{border-color:rgba(255,255,255,.20)}
    .inv-tag{font-size:12px;opacity:.86;margin-bottom:6px;}
    .inv-name{font-size:13px;line-height:1.25;word-break:keep-all;}
    .inv-count{
      position:absolute;right:10px;bottom:8px;
      font-size:12px;opacity:.95;
      padding:2px 7px;border-radius:999px;
      background:rgba(0,0,0,.25);
      border:1px solid rgba(255,255,255,.10);
    }

    /* rarity border tint */
    .r-i0{border-color:rgba(255,220,120,.40);}
    .r-i1{border-color:rgba(180,210,255,.40);}
    .r-i2{border-color:rgba(190,255,210,.32);}
    .r-i3{border-color:rgba(255,255,255,.18);}
    .r-i4{border-color:rgba(255,160,220,.28);}
    .r-i5{border-color:rgba(255,120,120,.28);}
    .r-i6{border-color:rgba(140,140,140,.24);}

    /* modal */
    .modal-bg{
      position:fixed;inset:0;background:rgba(0,0,0,.55);
      display:none;align-items:center;justify-content:center;padding:14px;
    }
    .modal{
      width:min(520px, 96vw);
      background:rgba(12,14,20,.92);
      border:1px solid rgba(255,255,255,.12);
      border-radius:18px;
      padding:14px;
      box-shadow:0 18px 90px rgba(0,0,0,.6);
    }
    .modal-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
    .modal .big{font-size:18px}
    .modal .meta{opacity:.8;font-size:12px;margin-top:6px;line-height:1.4}
    .modal .modal-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .xbtn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:7px 10px;cursor:pointer;color:var(--fg)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <div class="card">
        <div class="big">GOLD: <span id="gold">0</span></div>
        <div class="muted">초당 골드: <span id="gps">0</span></div>

        <div class="actions">
          <button class="btn" id="btnUpGold">채집 속도 업 (비용 <span id="costGoldUp">36</span>)</button>
          <button class="btn" id="btnBoost">부스트 10초 (비용 <span id="costBoost">50</span>)</button>
        </div>

        <div class="statline">
          <span class="pill">채집 Lv. <span id="goldLv">1</span></span>
          <span class="pill">부스트: <span id="boostState">OFF</span></span>
        </div>
      </div>

      <div class="card">
        <div class="big">CHEST: <span id="chest">0</span></div>
        <div class="muted">다음 상자까지: <span id="nextChest">--</span></div>

        <div class="actions">
          <button class="btn" id="btnOpen">상자 열기</button>
          <button class="btn btn2" id="btnUpChest">상자 획득 속도 업 (비용 <span id="costChestUp">109</span>)</button>
        </div>

        <div class="statline">
          <span class="pill">상자 Lv. <span id="chestLv">1</span></span>
          <span class="pill">드랍: 일반 80% / 레어 18% / 에픽 2%</span>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:12px;">
      <div class="big">획득 로그</div>
      <div class="muted">상자/업그레이드/골드 이벤트가 여기에 쌓임</div>
      <div id="log" class="logbox"></div>
    </div>

    <!-- Inventory -->
    <div class="card inv-card">
      <div class="inv-head">
        <div class="big">인벤토리</div>
        <div class="inv-controls">
          <input id="invSearch" placeholder="검색 (예: 육포, 도토리…)" />
          <select id="invSort">
            <option value="recent">최근 획득순</option>
            <option value="rarity">등급순</option>
            <option value="count">개수순</option>
            <option value="name">이름순</option>
          </select>
          <button class="btn btn2" id="invExport">백업</button>
          <button class="btn btn2" id="invImport">복원</button>
          <button class="btn" id="invClear">초기화</button>
        </div>
      </div>
      <div id="invGrid" class="inv-grid"></div>
    </div>
  </div>

  <!-- modal -->
  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <div class="modal-top">
        <div>
          <div class="big" id="mTitle">아이템</div>
          <div class="meta" id="mMeta"></div>
        </div>
        <button class="xbtn" id="mClose">닫기</button>
      </div>
      <div class="modal-actions">
        <button class="btn btn2" id="mMinus1">-1</button>
        <button class="btn btn2" id="mPlus1">+1</button>
        <button class="btn" id="mDelete">삭제</button>
      </div>
    </div>
  </div>

<script>
/* ===========================
   설정 (서버 붙일 때 여기만)
=========================== */
const USE_SERVER = true;                       // true로 바꾸면 서버 호출
const SERVER_OPEN_URL = "https://mrdindoin.ddns.net/gti/api/open_chest";            // 너 서버 endpoint로 변경

/* ===========================
   상태
=========================== */
const state = {
  gold: 0,
  goldLv: 1,
  gpsBase: 2.6,
  boost: { on:false, until:0 },

  chest: 0,
  chestLv: 1,
  chestTimer: 0,         // 다음 상자까지 남은 시간(ms)
  chestEvery: 2500,      // 기본 상자 획득 주기(ms) - Lv에 따라 줄어듦
};

const inv = {
  map: new Map(), // key -> { rarity, name, count, lastTs, firstTs }
};

/* ===========================
   유틸
=========================== */
function $(id){ return document.getElementById(id); }
function clamp(n,a,b){ return Math.max(a, Math.min(b,n)); }
function now(){ return Date.now(); }
function fmt1(n){ return (Math.round(n*10)/10).toFixed(1); }
function escapeHtml(s){
  return String(s)
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&#039;");
}
function rarityRank(r){
  const m = /^i(\d+)/.exec(r);
  return m ? parseInt(m[1],10) : 999;
}
function invKey(rarity,name){ return `${rarity}|${name}`; }

/* ===========================
   로그
=========================== */
function appendLog(html){
  const log = $("log");
  const atBottom = (log.scrollTop + log.clientHeight + 30) >= log.scrollHeight;
  const line = `<div class="log-gray">${html}</div>`;
  log.insertAdjacentHTML("beforeend", line);
  if(atBottom) log.scrollTop = log.scrollHeight;
}
function logOpen(rarity, name, goldGain){
  appendLog(
    `<span class="log-green"><b>상자 OPEN</b></span> → ` +
    `<span class="log-cyan">[${escapeHtml(rarity)}]</span> ${escapeHtml(name)} ` +
    `<span class="log-green">(+${goldGain}G)</span>`
  );
}

/* ===========================
   인벤토리
=========================== */
function addToInventory({ rarity, name, count=1 }){
  const key = invKey(rarity,name);
  const t = now();
  const cur = inv.map.get(key);
  if(cur){
    cur.count += count;
    cur.lastTs = t;
  }else{
    inv.map.set(key, { rarity, name, count, firstTs:t, lastTs:t });
  }
  if(inv.map.get(key).count <= 0){
    inv.map.delete(key);
  }
  saveAll();
  renderInventory();
}

function renderInventory(){
  const grid = $("invGrid");
  const q = ($("invSearch").value || "").trim().toLowerCase();
  const sort = $("invSort").value || "recent";

  let items = Array.from(inv.map.entries()).map(([key,v]) => ({ key, ...v }));

  if(q){
    items = items.filter(it =>
      it.name.toLowerCase().includes(q) ||
      it.rarity.toLowerCase().includes(q)
    );
  }

  if(sort === "recent"){
    items.sort((a,b)=> b.lastTs - a.lastTs);
  } else if(sort === "rarity"){
    items.sort((a,b)=> (rarityRank(a.rarity)-rarityRank(b.rarity)) || (b.lastTs-a.lastTs));
  } else if(sort === "count"){
    items.sort((a,b)=> (b.count-a.count) || (b.lastTs-a.lastTs));
  } else if(sort === "name"){
    items.sort((a,b)=> a.name.localeCompare(b.name,"ko"));
  }

  if(items.length === 0){
    grid.innerHTML = `<div style="opacity:.65;padding:10px;">비어있음</div>`;
    return;
  }

  grid.innerHTML = items.map(it => `
    <div class="inv-slot r-${escapeHtml(it.rarity)}" data-key="${escapeHtml(it.key)}" title="클릭: 상세">
      <div class="inv-tag">[${escapeHtml(it.rarity)}]</div>
      <div class="inv-name">${escapeHtml(it.name)}</div>
      <div class="inv-count">x${it.count}</div>
    </div>
  `).join("");

  // click bind
  grid.querySelectorAll(".inv-slot").forEach(el=>{
    el.addEventListener("click", ()=> openModal(el.dataset.key));
  });
}

/* ===========================
   모달
=========================== */
let modalKey = null;

function openModal(key){
  const it = inv.map.get(key);
  if(!it) return;
  modalKey = key;

  $("mTitle").textContent = `[${it.rarity}] ${it.name}`;
  const age1 = new Date(it.firstTs).toLocaleString();
  const age2 = new Date(it.lastTs).toLocaleString();
  $("mMeta").innerHTML =
    `개수: <b>${it.count}</b><br/>`+
    `첫 획득: ${escapeHtml(age1)}<br/>`+
    `최근: ${escapeHtml(age2)}`;

  $("modalBg").style.display = "flex";
}

function closeModal(){
  $("modalBg").style.display = "none";
  modalKey = null;
}

/* ===========================
   저장/로드 (로컬스토리지)
=========================== */
const KEY_SAVE = "gti_save_v1";

function saveAll(){
  const payload = {
    state,
    inv: Array.from(inv.map.entries()),
  };
  localStorage.setItem(KEY_SAVE, JSON.stringify(payload));
}

function loadAll(){
  try{
    const raw = localStorage.getItem(KEY_SAVE);
    if(!raw) return;
    const p = JSON.parse(raw);
    if(p.state){
      // 깊은 복사 대신 필요한 것만 병합
      Object.assign(state, p.state);
      // boost는 시간이 지난 경우 OFF 처리
      if(state.boost && state.boost.until && now() > state.boost.until){
        state.boost.on = false;
      }
    }
    if(p.inv && Array.isArray(p.inv)){
      inv.map = new Map(p.inv);
    }
  }catch(e){
    console.warn("load fail", e);
  }
}

/* ===========================
   밸런스 / 비용
=========================== */
function costGoldUp(){ return Math.floor(30 + (state.goldLv-1)*6 + Math.pow(state.goldLv,1.25)*6); }
function costBoost(){ return 50; }
function costChestUp(){ return Math.floor(90 + (state.chestLv-1)*19 + Math.pow(state.chestLv,1.18)*18); }

function gps(){
  let g = state.gpsBase + (state.goldLv-1)*0.35;
  if(state.boost.on) g *= 2.0;
  return g;
}
function chestEvery(){
  // Lv 오를수록 더 빠르게: 최소 700ms까지
  const t = 2500 - (state.chestLv-1)*140;
  return clamp(t, 700, 2500);
}

/* ===========================
   로컬 RNG 드랍 테이블(예시)
   i0가 가장 희귀(강함)로 가도 되지만,
   너 UI에선 일반/레어/에픽 느낌이라 i3~i1 중심으로 둠.
=========================== */
const DROPS = [
  { rarity:"i3", w:80, names:[
    "번뜩이는 소고기육포",
    "상한 나뭇가지",
    "오만방자한 도토리부두",
    "희미하고 일어나고 반짝이고 활기돋는 마늘",
    "쓸만한 돌멩이"
  ]},
  { rarity:"i1", w:18, names:[
    "단단하고 번지고 운동 많이 된다는 노라버섯",
    "과고한 구슬",
    "고고한 지렁이 엑기스",
    "고한 낚시바늘(연습용)"
  ]},
  { rarity:"i0", w:2, names:[
    "에망 룬문자: 守拙安分",
    "정(情) 역이용 방패(시대저항)",
    "미크론 운동법 매뉴얼 조각"
  ]},
];

function rollDrop(){
  const total = DROPS.reduce((a,b)=>a+b.w,0);
  let r = Math.random()*total;
  for(const t of DROPS){
    r -= t.w;
    if(r <= 0){
      const name = t.names[Math.floor(Math.random()*t.names.length)];
      return { rarity:t.rarity, name };
    }
  }
  // fallback
  const t = DROPS[0];
  return { rarity:t.rarity, name:t.names[0] };
}

function goldGainByRarity(r){
  // 네 로그 느낌 유지 (+3G, +6G, +20G 등)
  if(r==="i0") return 20;
  if(r==="i1") return 6;
  return 3;
}

/* ===========================
   상자 열기: 서버/로컬 공용
=========================== */
async function openChest(){
  if(state.chest <= 0){
    appendLog(`<span class="log-warn">상자 없음…</span>`);
    return;
  }
  state.chest -= 1;
  updateUI();

  if(USE_SERVER){
    // 서버 모드: {rarity,name,gold} 형태로 받는 걸 권장
    try{
      const res = await fetch(SERVER_OPEN_URL, {
        method:"POST",
        headers: { "Content-Type":"application/json" },
        body: JSON.stringify({ action:"open" })
      });
      if(!res.ok) throw new Error("HTTP "+res.status);
		const data = await res.json();
		if(!data.ok) throw new Error("not ok");

		// ✅ Flask 응답: rarity, item_name, bonus
		const rarity = data.rarity ?? "i6";
		const name = data.item_name ?? data.item ?? "unknown";
		const g = Number(data.bonus ?? 0);

		state.gold += g;
		logOpen(rarity, name, g);
		addToInventory({ rarity, name, count: 1 });
		updateUI();
		saveAll();
		return;
    }catch(e){
      appendLog(`<span class="log-warn">서버 실패 → 로컬 처리로 대체</span>`);
      // 실패하면 로컬로 떨어짐
    }
  }

  // 로컬 모드
  const d = rollDrop();
  const g = goldGainByRarity(d.rarity);
  state.gold += g;
  logOpen(d.rarity, d.name, g);
  addToInventory({ rarity:d.rarity, name:d.name, count:1 });
  updateUI();
  saveAll();
}

/* ===========================
   업그레이드
=========================== */
function upGold(){
  const c = costGoldUp();
  if(state.gold < c){ appendLog(`<span class="log-warn">골드 부족</span>`); return; }
  state.gold -= c;
  state.goldLv += 1;
  appendLog(`<span class="log-cyan"><b>채집 속도 업!</b></span> (Lv.${state.goldLv})`);
  saveAll(); updateUI();
}
function boost10s(){
  const c = costBoost();
  if(state.gold < c){ appendLog(`<span class="log-warn">골드 부족</span>`); return; }
  state.gold -= c;
  state.boost.on = true;
  state.boost.until = now() + 10_000;
  appendLog(`<span class="log-cyan"><b>부스트 ON</b></span> (10초)`);
  saveAll(); updateUI();
}
function upChest(){
  const c = costChestUp();
  if(state.gold < c){ appendLog(`<span class="log-warn">골드 부족</span>`); return; }
  state.gold -= c;
  state.chestLv += 1;
  appendLog(`<span class="log-cyan"><b>상자 획득 속도 업!</b></span> (Lv.${state.chestLv})`);
  saveAll(); updateUI();
}

/* ===========================
   UI 업데이트
=========================== */
function updateUI(){
  $("gold").textContent = Math.floor(state.gold);
  $("goldLv").textContent = state.goldLv;
  $("gps").textContent = fmt1(gps());

  $("chest").textContent = state.chest;
  $("chestLv").textContent = state.chestLv;

  $("costGoldUp").textContent = costGoldUp();
  $("costBoost").textContent = costBoost();
  $("costChestUp").textContent = costChestUp();

  const left = Math.max(0, state.chestTimer);
  $("nextChest").textContent = (left/1000).toFixed(1) + "s";

  // boost state
  if(state.boost.on){
    const remain = Math.max(0, state.boost.until - now());
    $("boostState").textContent = `ON (${(remain/1000).toFixed(1)}s)`;
  }else{
    $("boostState").textContent = "OFF";
  }

  // open btn
  $("btnOpen").disabled = (state.chest <= 0);
}

/* ===========================
   루프
=========================== */
let lastT = now();
function tick(){
  const t = now();
  const dt = t - lastT;
  lastT = t;

  // gold per sec
  state.gold += gps() * (dt/1000);

  // chest timer
  const every = chestEvery();
  state.chestEvery = every;
  state.chestTimer -= dt;
  while(state.chestTimer <= 0){
    state.chest += 1;
    state.chestTimer += every;
    appendLog(`<span class="log-green"><b>상자 획득!</b></span> (+1)`);
  }

  // boost expiry
  if(state.boost.on && t >= state.boost.until){
    state.boost.on = false;
    appendLog(`<span class="log-gray">부스트 종료</span>`);
  }

  updateUI();
  requestAnimationFrame(tick);
}

/* ===========================
   인벤 백업/복원
=========================== */
function exportBackup(){
  const payload = localStorage.getItem(KEY_SAVE) || "{}";
  navigator.clipboard?.writeText(payload).then(()=>{
    appendLog(`<span class="log-cyan">백업 문자열을 클립보드에 복사함</span>`);
  }).catch(()=>{
    prompt("아래 문자열을 복사해서 저장해둬:", payload);
  });
}
function importBackup(){
  const s = prompt("백업 문자열 붙여넣기:");
  if(!s) return;
  try{
    JSON.parse(s); // validate
    localStorage.setItem(KEY_SAVE, s);
    location.reload();
  }catch(e){
    appendLog(`<span class="log-warn">복원 실패: JSON 아님</span>`);
  }
}

/* ===========================
   이벤트 바인딩
=========================== */
$("btnOpen").addEventListener("click", openChest);
$("btnUpGold").addEventListener("click", upGold);
$("btnBoost").addEventListener("click", boost10s);
$("btnUpChest").addEventListener("click", upChest);

$("invSearch").addEventListener("input", renderInventory);
$("invSort").addEventListener("change", renderInventory);
$("invClear").addEventListener("click", ()=>{
  if(!confirm("인벤/상태 전부 초기화?")) return;
  localStorage.removeItem(KEY_SAVE);
  location.reload();
});
$("invExport").addEventListener("click", exportBackup);
$("invImport").addEventListener("click", importBackup);

// modal
$("mClose").addEventListener("click", closeModal);
$("modalBg").addEventListener("click", (e)=>{ if(e.target.id==="modalBg") closeModal(); });
$("mMinus1").addEventListener("click", ()=>{
  if(!modalKey) return;
  const it = inv.map.get(modalKey);
  if(!it) return;
  addToInventory({ rarity: it.rarity, name: it.name, count:-1 });
  if(!inv.map.get(modalKey)) closeModal(); else openModal(modalKey);
});
$("mPlus1").addEventListener("click", ()=>{
  if(!modalKey) return;
  const it = inv.map.get(modalKey);
  if(!it) return;
  addToInventory({ rarity: it.rarity, name: it.name, count:+1 });
  openModal(modalKey);
});
$("mDelete").addEventListener("click", ()=>{
  if(!modalKey) return;
  const it = inv.map.get(modalKey);
  if(!it) return;
  if(!confirm("이 아이템을 인벤에서 삭제?")) return;
  inv.map.delete(modalKey);
  saveAll();
  renderInventory();
  closeModal();
});

/* ===========================
   시작
=========================== */
loadAll();

// 첫 상자 타이머 없으면 초기화
if(!state.chestTimer || state.chestTimer > 60_000) state.chestTimer = chestEvery();

// 초기 로그
appendLog(`<span class="log-gray">시작. (로컬저장 ON)</span>`);
appendLog(`<span class="log-gray">서버 모드: ${USE_SERVER ? "ON" : "OFF"}</span>`);

renderInventory();
updateUI();
requestAnimationFrame(tick);
</script>
</body>
