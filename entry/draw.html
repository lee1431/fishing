<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>WINNERS.COM</title>
  <style>
    :root{
      --bg:#050805; --fg:#39ff14; --dim:#1fbf0f; --line:#0d3a0d;
      --err:#ff4d4d;
    }
    html,body{height:100%}
    body{
      margin:0;background:var(--bg);color:var(--fg);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      letter-spacing:.3px;
    }
    .crt:before{
      content:"";position:fixed; inset:0;
      background: repeating-linear-gradient(to bottom,
        rgba(255,255,255,0.03), rgba(255,255,255,0.03) 1px,
        rgba(0,0,0,0) 2px, rgba(0,0,0,0) 4px);
      pointer-events:none; mix-blend-mode:overlay;
    }
    .wrap{max-width:980px;margin:0 auto;padding:28px 16px 48px}
    .box{border:1px solid var(--line);padding:16px;background:rgba(0,0,0,.25)}
    .title{font-size:28px;margin:0 0 8px 0}
    .dim{color:var(--dim)}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    button{
      background:transparent;border:1px solid var(--fg);
      color:var(--fg);padding:10px 12px;cursor:pointer;
      min-width:140px;
    }
    button:disabled{opacity:.55;cursor:not-allowed}
    .pill{border:1px solid var(--line);padding:2px 8px;display:inline-block}
    ul{margin:10px 0 0 0;padding-left:18px}
    li{margin:8px 0}
    .big{border:1px dashed var(--fg);padding:12px;font-size:18px}
    a{color:var(--fg)}
  </style>

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9382191250873184"
     crossorigin="anonymous"></script>
  
</head>
<body class="crt">
  <div class="wrap">
    <div class="box">
      <div class="title">C:\> WINNERS.COM</div>
      <div class="dim">- 결과 전용 페이지(조회만 가능) · <a href="./pool.html">[POOL]</a> · <a href="./entry.html">[ENTRY]</a></div>
      <div class="dim">- 회차 이동: &lt; PREV / NEXT &gt;</div>
    </div>

    <div style="height:12px"></div>

    <div class="box">
      <div class="row" style="justify-content:space-between">
        <div class="dim">ROUND: <span id="round" class="pill">-</span></div>
        <div class="dim">COUNT: <span id="count" class="pill">0</span></div>
      </div>

      <div style="height:10px"></div>

      <div class="row">
        <button id="prevBtn">&lt; PREV</button>
        <button id="nextBtn">NEXT &gt;</button>
        <button id="latestBtn">LATEST</button>
      </div>

      <div style="height:12px"></div>

      <div class="dim">WINNERS LIST:</div>
      <div class="big">
        <ul id="list" style="margin:0;padding-left:18px"></ul>
      </div>

      <div id="msg" class="dim" style="margin-top:10px">READY.</div>
    </div>
  </div>

  <script>
    const $ = (s)=>document.querySelector(s);
    const setMsg = (t, isErr=false)=>{
      const el=$("#msg");
      el.textContent=t;
      el.style.color = isErr ? "var(--err)" : "var(--dim)";
    };

    function maskEmail(email){
      if(!email || !email.includes("@")) return "***";
      const [local, dom] = email.split("@");
      if(local.length <= 2) return local[0] + "*@" + dom;
      return local.slice(0,2) + "*".repeat(Math.max(1, local.length-3)) + local.slice(-1) + "@" + dom;
    }

    let rounds = [];      // ["2026-W09", ...] desc
    let idx = 0;          // current index in rounds

    async function loadRounds(){
      const res = await fetch("https://mrdindoin.ddns.net/entry/api/winners/rounds");
      const data = await res.json();
      rounds = (data.rounds || []).map(r => r.round_key);
      if(rounds.length === 0){
        $("#round").textContent = "-";
        $("#count").textContent = "0";
        $("#list").innerHTML = "<li>NO WINNERS YET.</li>";
        $("#prevBtn").disabled = true;
        $("#nextBtn").disabled = true;
        setMsg("EMPTY.");
        return false;
      }
      return true;
    }

    async function showRound(roundKey){
      setMsg("LOADING...");
      const res = await fetch("https://mrdindoin.ddns.net/entry/api/winners?round=" + encodeURIComponent(roundKey));
      const data = await res.json();

      if(!res.ok || !data.ok){
        setMsg("ERROR: LOAD FAILED", true);
        return;
      }

      $("#round").textContent = data.round_key;
      $("#count").textContent = (data.winners || []).length;

      const ul = $("#list");
      ul.innerHTML = "";
      if(!data.winners || data.winners.length === 0){
        ul.innerHTML = "<li>NO WINNERS IN THIS ROUND.</li>";
      }else{
        data.winners.forEach((w,i)=>{
          const li = document.createElement("li");
          li.textContent = `${String(i+1).padStart(2,"0")}. ${maskEmail(w.email)}`;
          ul.appendChild(li);
        });
      }

      $("#prevBtn").disabled = (idx >= rounds.length - 1);
      $("#nextBtn").disabled = (idx <= 0);
      setMsg("OK.");
    }

    async function goLatest(){
      const ok = await loadRounds();
      if(!ok) return;
      idx = 0; // desc 정렬이므로 0이 최신
      await showRound(rounds[idx]);
    }

    $("#prevBtn").addEventListener("click", async ()=>{
      if(idx >= rounds.length - 1) return;
      idx += 1;
      await showRound(rounds[idx]);
    });

    $("#nextBtn").addEventListener("click", async ()=>{
      if(idx <= 0) return;
      idx -= 1;
      await showRound(rounds[idx]);
    });

    $("#latestBtn").addEventListener("click", goLatest);

    // 초기 로드: 최신 회차
    goLatest();

    // 주기적으로 최신 회차 갱신(예: 60초마다)
    setInterval(async ()=>{
      const prevLatest = rounds[0] || null;
      const ok = await loadRounds();
      if(!ok) return;
      const newLatest = rounds[0] || null;
      if(newLatest && newLatest !== prevLatest){
        idx = 0;
        await showRound(rounds[idx]);
      }
    }, 60000);
  </script>
</body>
</html>
