<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>응모</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto;max-width:720px;margin:40px auto;padding:0 16px;}
    .card{border:1px solid #ddd;border-radius:12px;padding:18px;}
    input,button,textarea{font:inherit;padding:10px;border-radius:10px;border:1px solid #ccc;width:100%;}
    button{cursor:pointer}
    .row{display:flex;gap:10px;align-items:center}
    .muted{color:#666;font-size:14px}
    .err{color:#b00020}
  </style>
</head>
<body>
  <h1>응모</h1>
  <div class="card">
    <div class="muted">이메일을 입력하고 응모하세요.</div>
    <div style="height:10px"></div>
    <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />
    <div style="height:10px"></div>
    <button id="btn">응모하기</button>
    <div id="msg" class="muted" style="margin-top:10px"></div>
  </div>

  <script>
    const $ = (s)=>document.querySelector(s);
    const msg = (t, isErr=false) => { $("#msg").textContent=t; $("#msg").className = isErr ? "err" : "muted"; };

    $("#btn").addEventListener("click", async () => {
      const email = $("#email").value.trim();
      if(!email){ msg("이메일을 입력해주세요.", true); return; }

      $("#btn").disabled = true;
      msg("처리 중...");

      try{
        const res = await fetch("https://mrdindoin.ddns.net/entry/api/enter", {
          method:"POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({ email })
        });
        const data = await res.json().catch(()=>({}));
        if(!res.ok) throw new Error(data.error || "failed");

        // 응모 후 풀 화면으로 이동
        location.href = "/pool";
      }catch(e){
        msg("응모에 실패했어요. 이메일 형식/네트워크를 확인해주세요.", true);
      }finally{
        $("#btn").disabled = false;
      }
    });
  </script>
</body>
</html>
