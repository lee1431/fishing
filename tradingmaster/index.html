<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>트레이딩 마인드 컨트롤 MASTER</title>
  <style>
    body{font-family:system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin:0; background:#0b0f17; color:#e8eefc;}
    .wrap{max-width:980px; margin:0 auto; padding:18px;}
    .card{background:#121a2a; border:1px solid rgba(255,255,255,.08); border-radius:16px; padding:16px; box-shadow:0 10px 30px rgba(0,0,0,.25);}
    h1{font-size:20px; margin:0 0 6px;}
    .muted{opacity:.75; font-size:13px;}
    .grid{display:grid; grid-template-columns: 1fr 1fr; gap:12px;}
    .grid1{display:grid; grid-template-columns: 1fr; gap:12px;}
    label{font-size:13px; opacity:.9;}
    input, textarea, select{width:100%; padding:10px 12px; border-radius:12px; border:1px solid rgba(255,255,255,.10); background:#0b1220; color:#e8eefc; outline:none;}
    textarea{min-height:84px; resize:vertical;}
    .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
    .btn{padding:10px 12px; border-radius:12px; border:1px solid rgba(255,255,255,.12); background:#18233a; color:#e8eefc; cursor:pointer;}
    .btn:hover{filter:brightness(1.08);}
    .btn.primary{background:#2a4cff; border-color:#2a4cff;}
    .btn.danger{background:#3a1a1a; border-color:rgba(255,80,80,.35);}
    .pill{display:inline-flex; align-items:center; gap:8px; padding:6px 10px; border-radius:999px; border:1px solid rgba(255,255,255,.10); background:#0b1220; font-size:12px;}
    .sep{height:1px; background:rgba(255,255,255,.08); margin:12px 0;}
    table{width:100%; border-collapse:collapse; font-size:13px;}
    th,td{padding:10px 8px; border-bottom:1px solid rgba(255,255,255,.08); text-align:left;}
    .right{text-align:right;}
    .ok{color:#7CFFB2;}
    .bad{color:#FF8A8A;}
    .warn{color:#FFD48A;}
    @media (max-width: 860px){ .grid{grid-template-columns:1fr;} }

    * {
      box-sizing: border-box;
    }
    
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      margin: 0;
      background: #0b0f17;
      color: #e8eefc;
    }
    
    .wrap {
      max-width: 960px;
      margin: 40px auto;
      padding: 20px;
    }
    
    .card {
      background: #121a2a;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,.35);
    }
    
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    
    .grid1 {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    
    label {
      font-size: 13px;
      opacity: .9;
      display: block;
      margin-bottom: 6px;
    }
    
    input, textarea, select {
      width: 100%;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.10);
      background: #0b1220;
      color: #e8eefc;
      outline: none;
      font-size: 14px;
    }
    
    textarea {
      min-height: 100px;
      resize: vertical;
    }
    
    input[type="checkbox"] {
      width: auto;
      margin-right: 8px;
    }
    
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    
    .btn {
      padding: 10px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.12);
      background: #18233a;
      color: #e8eefc;
      cursor: pointer;
      font-size: 14px;
      transition: 0.15s ease;
    }
    
    .btn:hover {
      transform: translateY(-1px);
      opacity: 0.9;
    }
    
    .btn.primary {
      background: #2a4cff;
      border-color: #2a4cff;
    }
    
    .btn.danger {
      background: #3a1a1a;
      border-color: rgba(255,80,80,.35);
    }
    
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.10);
      background: #0b1220;
      font-size: 12px;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    
    th, td {
      padding: 12px 10px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      text-align: left;
    }
    
    .right {
      text-align: right;
    }
    
    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }


    
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>트레이딩 마인드 컨트롤 MASTER</h1>
      <div class="muted">하루 1포지션 모드 · 체크시트 + 저장/통계 (Termux 서버)</div>

      <div class="sep"></div>

      <div class="row">
        <span class="pill">완성도: <b id="completeness">0%</b></span>
        <span class="pill">규칙 위반: <b id="violations">0</b></span>
        <span class="pill">승/패/무: <b id="wld">0/0/0</b></span>
        <span class="pill">평균 손익비: <b id="avgRR">-</b></span>
      </div>

      <div class="sep"></div>

      <div class="grid">
        <div>
          <label>날짜</label>
          <input id="date" type="date" />
        </div>

        <div>
          <label>주요 방향성</label>
          <select id="bias">
            <option value="">선택</option>
            <option value="상승">상승</option>
            <option value="하락">하락</option>
            <option value="횡보">횡보</option>
          </select>
        </div>

        <div class="grid1">
          <label><input id="marketSummaryDone" type="checkbox" /> 시장상황 정리 완료</label>
          <label><input id="stopSet" type="checkbox" /> 손절가 설정 완료</label>
          <label><input id="targetSet" type="checkbox" /> 목표가 설정 완료</label>
          <label><input id="oneEntryOnly" type="checkbox" /> 오늘 1회만 진입했는가?</label>
        </div>

        <div class="grid1">
          <div>
            <label>손익비 (예: 1:2 / 1:2.5 / 2)</label>
            <input id="rr" placeholder="1:2" />
          </div>
          <div>
            <label>감정 상태 (차분/조급/불안 등)</label>
            <input id="emotion" placeholder="차분" />
          </div>
          <div>
            <label>결과</label>
            <select id="result">
              <option value="">선택</option>
              <option value="승">승</option>
              <option value="패">패</option>
              <option value="무">무</option>
            </select>
          </div>
        </div>

        <div>
          <label>진입 근거 1</label>
          <input id="r1" placeholder="근거를 한 문장으로" />
        </div>
        <div>
          <label>진입 근거 2</label>
          <input id="r2" placeholder="근거를 한 문장으로" />
        </div>
        <div>
          <label>진입 근거 3</label>
          <input id="r3" placeholder="근거를 한 문장으로" />
        </div>
        <div>
          <label>복기 메모</label>
          <textarea id="notes" placeholder="오늘의 실수/잘한 점/내일 룰"></textarea>
        </div>
      </div>

      <div class="sep"></div>

      <div class="row">
        <button class="btn primary" id="btnAdd">오늘 기록 저장(추가)</button>
        <button class="btn" id="btnUpdate">선택 기록 업데이트</button>
        <button class="btn danger" id="btnDelete">선택 기록 삭제</button>
        <button class="btn" id="btnReload">서버에서 다시 불러오기</button>
        <button class="btn" id="btnExport">JSON 내보내기</button>
        <label class="btn">
          JSON 가져오기 <input id="importFile" type="file" accept="application/json" style="display:none;">
        </label>
      </div>

      <div class="sep"></div>

      <div class="muted">기록 목록</div>
      <div style="overflow:auto; margin-top:10px;">
        <table>
          <thead>
            <tr>
              <th>날짜</th>
              <th>방향</th>
              <th>완성도</th>
              <th>1포지션</th>
              <th>결과</th>
              <th class="right">손익비</th>
            </tr>
          </thead>
          <tbody id="list"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
