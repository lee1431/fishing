<style>
:root{
  --size: 120px;
  --gap: 6px;
  --bg:#ffffff;
  --line:#e9ecef;
  --accent:#123c2f;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:Inter, sans-serif;
  background:
    linear-gradient(#f2f4f3 1px, transparent 1px),
    linear-gradient(90deg, #f2f4f3 1px, transparent 1px);
  background-size: 24px 24px;
  background-color:#ffffff;
}

header{
  height:48px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 18px;
  border-bottom:1px solid var(--line);
  font-size:13px;
  letter-spacing:.5px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(var(--size),1fr));
  gap:var(--gap);
  padding:var(--gap);
}

.item{
  aspect-ratio:1/1;
  background:#f4f6f5;
  position:relative;
  overflow:hidden;
  cursor:pointer;
  transition:transform .15s ease;
}

.item:hover{
  transform:scale(1.04);
  z-index:2;
}

.item img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.item .title{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,.65);
  color:#fff;
  font-size:11px;
  padding:4px 6px;
  opacity:0;
  transition:.2s;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.item:hover .title{
  opacity:1;
}
</style>
</head>
