<style>
:root{
  --size: 120px;
  --gap: 6px;
  --bg:#ffffff;
  --line:#e9ecef;
  --accent:#123c2f;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:Inter, sans-serif;
  background:
    linear-gradient(#f2f4f3 1px, transparent 1px),
    linear-gradient(90deg, #f2f4f3 1px, transparent 1px);
  background-size: 24px 24px;
  background-color:#ffffff;
}

header{
  height:48px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 18px;
  border-bottom:1px solid var(--line);
  font-size:13px;
  letter-spacing:.5px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(var(--size),1fr));
  gap:var(--gap);
  padding:var(--gap);
}

.item{
  aspect-ratio:1/1;
  background:#f4f6f5;
  position:relative;
  overflow:hidden;
  cursor:pointer;
  transition:transform .15s ease;
}

.item:hover{
  transform:scale(1.04);
  z-index:2;
}

.item img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.item .title{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,.65);
  color:#fff;
  font-size:11px;
  padding:4px 6px;
  opacity:0;
  transition:.2s;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.item:hover .title{
  opacity:1;
}

.item .count{
  position:absolute;
  top:4px;
  left:4px;
  background:rgba(0,0,0,.65);
  color:#fff;
  font-size:10px;
  padding:2px 6px;
  border-radius:3px;
  pointer-events:none;
}
	
</style>
	
</head>

<script>

function updateProjectCounter() {
	const count = document.querySelectorAll('.item').length;
	const el = document.getElementById('project-count');
	if (el) el.textContent = String(count);
}
document.addEventListener('DOMContentLoaded', () => {
	updateProjectCounter();
	const observer = new MutationObserver(updateProjectCounter);
	observer.observe(document.querySelector('.grid') || document.body, {
		childList: true,
		subtree: true
	});
});
	
window.addEventListener("scroll", () => {
	if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 400){
		loadMore();
	}
});
	

fetch("https://mrdindoin.ddns.net/logcnt/log?project=index")
  .catch(()=>{});


async function loadCounts(){

  try{

    const res = await fetch("https://mrdindoin.ddns.net/logcnt/counts/list");
    const data = await res.json();

    document.querySelectorAll(".project-link").forEach(link => {

      const key = link.dataset.url;
      const countBox = link.querySelector(".count");

      if(!countBox) return;

      const count = data[key] || 0;
      countBox.textContent = count;

    });

  }catch(e){
    console.log("count load fail");
  }

}

document.addEventListener("DOMContentLoaded", loadCounts);
	
</script>
